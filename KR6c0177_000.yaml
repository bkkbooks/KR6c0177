front:
  text: 般若心經指掌序般若無知諸法本寂根由一真之妙體影現二諦之浮名似實似虗非虗實之所能擬亦離亦合非離合之所能明所以空而非空有而非有互成不妨互奪並存亦可並亡泯立無閡隱顯自在是謂般若之玄宗也怎奈凡心易惑智火難然如舉網以張風似從波而捉月徒歷艱辛翻成障礙由是百苦交纏千殃並集都由此一念之執耳茲般若心經者文約而義實豐詞顯而理殊奧首開空色兩門專破有無二執有無盡而實相可顯色空合而妙義方圓日用明此般若之道思過半矣嘗見諸家注釋罕臻其奧唯賢首孤山二疏果彌法壇老將但廣托經論侈布筌非初學之所可通故茲特為指掌使其易見所以便初學也然萬里之行起於跬步觀者幸毋忽焉歲在甲午孟秋佛歡喜日鼓山比丘元賢稽首和南序贊老漢行年今八十世間事事皆收拾唯這影子遍諸方敗露重重遮不及會麼有相身中無相身低頭方見明歷歷永覺老人自題
